<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#1f2937"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#e11d48"/>
    </marker>
    <style>
      .bg{fill:#f5f7fb}
      .card{fill:#fff;stroke:#dfe5ee;stroke-width:2;rx:28}
      .zone{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1.5;rx:22}
      .state{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:18}
      .run{fill:#ecfdf5;stroke:#059669;stroke-width:3;rx:18}
      .fault{fill:#fff1f2;stroke:#e11d48;stroke-width:3;rx:18}
      .line{stroke:#1f2937;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-dark)}
      .faultline{stroke:#e11d48;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:12 9;marker-end:url(#arrow-red)}
      .title{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:38px;font-weight:700;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:23px;fill:#64748b}
      .label{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:27px;font-weight:600;fill:#111827}
      .small{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:21px;fill:#334155}
      .muted{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:19px;fill:#64748b}
      .tag{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:18px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="46" y="42" width="1508" height="816" class="card"/>
  <text x="86" y="104" class="title">数字电源软件状态机</text>
  <text x="86" y="142" class="subtitle">状态机只处理运行阶段切换和故障锁存；PI 控制器不直接承担故障判断职责。</text>

  <rect x="86" y="202" width="1428" height="488" class="zone"/>

  <rect x="116" y="374" width="160" height="116" class="state"/>
  <text x="160" y="420" class="label">INIT</text>
  <text x="148" y="454" class="small">初始化参数</text>

  <rect x="346" y="374" width="160" height="116" class="state"/>
  <text x="390" y="420" class="label">IDLE</text>
  <text x="378" y="454" class="small">等待启动</text>

  <rect x="576" y="374" width="210" height="116" class="state"/>
  <text x="610" y="420" class="label">SOFT_START</text>
  <text x="622" y="454" class="small">Vref 斜坡上升</text>

  <rect x="856" y="374" width="160" height="116" class="run"/>
  <text x="902" y="420" class="label">RUN</text>
  <text x="894" y="454" class="small">闭环运行</text>

  <rect x="1200" y="258" width="210" height="116" class="fault"/>
  <text x="1228" y="304" class="label">FAULT_LATCH</text>
  <text x="1260" y="338" class="small">故障锁存</text>

  <rect x="1200" y="514" width="210" height="116" class="state"/>
  <text x="1244" y="560" class="label">RECOVERY</text>
  <text x="1262" y="594" class="small">故障恢复</text>

  <line x1="276" y1="432" x2="346" y2="432" class="line"/>
  <text x="288" y="412" class="tag">初始化完成</text>

  <line x1="506" y1="432" x2="576" y2="432" class="line"/>
  <text x="522" y="412" class="tag">启动命令</text>

  <line x1="786" y1="432" x2="856" y2="432" class="line"/>
  <text x="792" y="412" class="tag">软启动完成</text>

  <path d="M936 490 L936 636 L426 636 L426 490" class="line"/>
  <text x="650" y="620" class="tag">关闭命令</text>

  <path d="M681 374 L681 272 L1200 272" class="faultline"/>
  <text x="820" y="256" class="tag">启动异常</text>

  <path d="M1016 432 L1106 432 L1106 316 L1200 316" class="faultline"/>
  <text x="1040" y="414" class="tag">运行故障</text>

  <line x1="1305" y1="374" x2="1305" y2="514" class="line"/>
  <text x="1326" y="452" class="tag">清除故障</text>

  <path d="M1200 572 L426 572 L426 490" class="line"/>
  <text x="720" y="554" class="tag">恢复到 IDLE</text>

  <rect x="86" y="730" width="1428" height="82" class="zone"/>
  <text x="118" y="766" class="muted">说明：故障采用锁存方式，是为了保留 fault_code、duty、Vout、Iout 等关键变量，方便复现和定位问题。</text>
  <text x="118" y="798" class="muted">第一版先实现锁存故障和手动清除，自动重启策略放到后续章节。</text>
</svg>
