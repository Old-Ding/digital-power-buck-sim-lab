<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <style>
      .box{fill:#f7fbff;stroke:#2563eb;stroke-width:3;rx:14}
      .plant{fill:#fff7ed;stroke:#ea580c;stroke-width:3;rx:14}
      .protect{fill:#fff1f2;stroke:#e11d48;stroke-width:3;rx:14}
      .line{stroke:#222;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .feedback{stroke:#555;stroke-width:3;fill:none;marker-end:url(#arrow);stroke-dasharray:10 7;stroke-linecap:round;stroke-linejoin:round}
      .title{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:32px;font-weight:600;fill:#111}
      .label{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:27px;fill:#222}
      .small{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:21px;fill:#444}
      .note{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:20px;fill:#666}
    </style>
  </defs>

  <rect x="30" y="30" width="1340" height="660" fill="#fff" stroke="#e5e7eb" stroke-width="2" rx="18"/>
  <text x="60" y="82" class="title">数字 Buck 电源闭环控制链路</text>
  <text x="60" y="118" class="note">控制器周期性采样输出电压，根据误差更新 PWM 占空比。</text>

  <rect x="80" y="286" width="150" height="96" class="box"/>
  <text x="122" y="328" class="label">Vref</text>
  <text x="112" y="358" class="small">目标 12V</text>

  <rect x="300" y="286" width="170" height="96" class="box"/>
  <text x="358" y="326" class="label">误差</text>
  <text x="326" y="358" class="small">e=Vref-Vout</text>

  <rect x="540" y="286" width="180" height="96" class="box"/>
  <text x="586" y="326" class="label">PI 控制</text>
  <text x="574" y="358" class="small">限幅/抗饱和</text>

  <rect x="790" y="286" width="170" height="96" class="box"/>
  <text x="836" y="326" class="label">PWM</text>
  <text x="828" y="358" class="small">更新 duty</text>

  <rect x="1030" y="268" width="210" height="132" class="plant"/>
  <text x="1090" y="322" class="label">Buck</text>
  <text x="1070" y="356" class="small">功率级响应</text>

  <line x1="230" y1="334" x2="300" y2="334" class="line"/>
  <line x1="470" y1="334" x2="540" y2="334" class="line"/>
  <line x1="720" y1="334" x2="790" y2="334" class="line"/>
  <line x1="960" y1="334" x2="1030" y2="334" class="line"/>

  <rect x="1030" y="520" width="210" height="92" class="box"/>
  <text x="1092" y="558" class="label">ADC</text>
  <text x="1074" y="590" class="small">采样 Vout/Iout</text>

  <path d="M1135 400 L1135 520" class="feedback"/>
  <path d="M1030 566 L385 566 L385 382" class="feedback"/>
  <text x="560" y="548" class="small">反馈采样值</text>

  <rect x="520" y="160" width="440" height="88" class="protect"/>
  <text x="592" y="196" class="label">保护与状态机</text>
  <text x="578" y="226" class="small">UVLO / OVP / OCP / OTP / FAULT</text>

  <path d="M1135 520 L1135 204 L960 204" class="feedback"/>
  <path d="M740 248 L740 286" class="feedback"/>
  <text x="970" y="188" class="small">故障检测结果</text>

  <text x="86" y="462" class="note">第一版先做电压环，后续可继续扩展电流环、前馈控制和更复杂的保护策略。</text>
</svg>
