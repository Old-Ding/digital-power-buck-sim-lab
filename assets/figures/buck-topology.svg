<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#059669"/>
    </marker>
    <style>
      .bg{fill:#f5f7fb}
      .card{fill:#fff;stroke:#dfe5ee;stroke-width:2;rx:28}
      .zone{fill:#f8fafc;stroke:#e2e8f0;stroke-width:1.5;rx:20}
      .powerBlock{fill:#fff7ed;stroke:#f97316;stroke-width:3;rx:18}
      .switchBlock{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:18}
      .senseBlock{fill:#ecfdf5;stroke:#059669;stroke-width:3;rx:18}
      .wire{stroke:#1f2937;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .powerWire{stroke:#2563eb;stroke-width:7;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .signalWire{stroke:#059669;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:10 8;marker-end:url(#arrow-green)}
      .component{stroke:#1f2937;stroke-width:5;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .node{fill:#111827}
      .title{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:38px;font-weight:700;fill:#0f172a}
      .subtitle{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:23px;fill:#64748b}
      .label{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:27px;font-weight:600;fill:#111827}
      .small{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:21px;fill:#334155}
      .muted{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:19px;fill:#64748b}
      .tag{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:18px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1600" height="900" class="bg"/>
  <rect x="46" y="42" width="1508" height="816" class="card"/>

  <text x="86" y="104" class="title">Buck 降压电源基本拓扑</text>
  <text x="86" y="142" class="subtitle">第一阶段只说明功率级主回路：输入电源、开关管、续流器件、电感、输出电容和负载。</text>

  <rect x="86" y="304" width="170" height="126" class="powerBlock"/>
  <text x="132" y="354" class="label">Vin</text>
  <text x="118" y="388" class="small">18V-30V</text>
  <text x="106" y="466" class="muted">输入直流电源</text>

  <rect x="374" y="286" width="196" height="116" class="switchBlock"/>
  <text x="415" y="335" class="label">MOSFET</text>
  <text x="420" y="370" class="small">高边开关管</text>

  <rect x="386" y="616" width="220" height="92" class="switchBlock"/>
  <text x="428" y="656" class="label">续流器件</text>
  <text x="420" y="688" class="small">二极管 / 同步 MOSFET</text>

  <rect x="1130" y="286" width="176" height="116" class="powerBlock"/>
  <text x="1176" y="335" class="label">Load</text>
  <text x="1182" y="370" class="small">负载</text>

  <rect x="1270" y="112" width="190" height="88" class="senseBlock"/>
  <text x="1318" y="160" class="label">ADC</text>
  <text x="1306" y="188" class="small">采样 Vout</text>

  <rect x="368" y="186" width="206" height="80" class="senseBlock"/>
  <text x="404" y="234" class="label">PWM duty</text>

  <line x1="171" y1="278" x2="171" y2="304" class="wire"/>
  <line x1="171" y1="430" x2="171" y2="604" class="wire"/>
  <path d="M171 278 L374 278" class="powerWire"/>

  <line x1="472" y1="266" x2="472" y2="286" class="signalWire"/>
  <path d="M570 344 L662 344" class="powerWire"/>
  <circle cx="662" cy="344" r="8" class="node"/>
  <text x="630" y="308" class="small">SW 节点</text>

  <path d="M662 344 C694 278, 748 410, 780 344 C812 278, 866 410, 898 344 C930 278, 984 410, 1016 344" class="wire"/>
  <text x="792" y="284" class="label">电感 L</text>

  <path d="M1016 344 L1130 344" class="powerWire"/>
  <circle cx="1048" cy="344" r="8" class="node"/>
  <text x="1016" y="306" class="small">Vout</text>

  <path d="M1306 344 L1376 344 L1376 604" class="wire"/>
  <path d="M1048 344 L1048 450" class="wire"/>
  <line x1="990" y1="450" x2="1106" y2="450" class="component"/>
  <line x1="990" y1="500" x2="1106" y2="500" class="component"/>
  <path d="M1048 500 L1048 604" class="wire"/>
  <text x="1120" y="490" class="small">输出电容 C</text>

  <path d="M662 344 L662 442" class="wire"/>
  <line x1="612" y1="442" x2="712" y2="442" class="component"/>
  <path d="M662 454 L612 548 L712 548 Z" fill="#fff" stroke="#1f2937" stroke-width="5" stroke-linejoin="round"/>
  <path d="M662 548 L662 604" class="wire"/>
  <path d="M496 616 L610 548" class="signalWire"/>

  <path d="M171 604 L1376 604" class="wire"/>
  <text x="760" y="664" class="label">GND</text>

  <path d="M1048 344 L1048 156 L1270 156" class="signalWire"/>
  <text x="1084" y="140" class="small">电压反馈采样</text>

  <rect x="86" y="742" width="1428" height="70" class="zone"/>
  <text x="118" y="786" class="muted">说明：本图只承担“功率级拓扑”职责。保护检测、状态机和控制算法在后续控制链路图中单独说明。</text>
</svg>
