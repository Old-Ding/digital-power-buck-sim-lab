<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <style>
      .state{fill:#f7fbff;stroke:#2563eb;stroke-width:3;rx:16}
      .fault{fill:#fff1f2;stroke:#e11d48;stroke-width:3;rx:16}
      .line{stroke:#222;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .faultline{stroke:#e11d48;stroke-width:4;fill:none;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:10 7}
      .title{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:32px;font-weight:600;fill:#111}
      .label{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:27px;fill:#222}
      .small{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:21px;fill:#444}
      .note{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:20px;fill:#666}
    </style>
  </defs>

  <rect x="30" y="30" width="1340" height="660" fill="#fff" stroke="#e5e7eb" stroke-width="2" rx="18"/>
  <text x="60" y="82" class="title">数字电源软件状态机</text>
  <text x="60" y="118" class="note">状态机负责启动、运行、故障锁存和恢复；PI 控制器只负责占空比计算。</text>

  <rect x="80" y="310" width="150" height="94" class="state"/>
  <text x="124" y="350" class="label">INIT</text>
  <text x="112" y="382" class="small">初始化</text>

  <rect x="300" y="310" width="150" height="94" class="state"/>
  <text x="344" y="350" class="label">IDLE</text>
  <text x="330" y="382" class="small">等待启动</text>

  <rect x="520" y="310" width="190" height="94" class="state"/>
  <text x="544" y="350" class="label">SOFT_START</text>
  <text x="560" y="382" class="small">参考值爬升</text>

  <rect x="780" y="310" width="150" height="94" class="state"/>
  <text x="828" y="350" class="label">RUN</text>
  <text x="814" y="382" class="small">闭环运行</text>

  <rect x="1050" y="180" width="210" height="100" class="fault"/>
  <text x="1078" y="222" class="label">FAULT_LATCH</text>
  <text x="1106" y="254" class="small">故障锁存</text>

  <rect x="1050" y="440" width="210" height="100" class="state"/>
  <text x="1094" y="482" class="label">RECOVERY</text>
  <text x="1112" y="514" class="small">故障恢复</text>

  <line x1="230" y1="357" x2="300" y2="357" class="line"/>
  <text x="248" y="338" class="small">完成</text>

  <line x1="450" y1="357" x2="520" y2="357" class="line"/>
  <text x="468" y="338" class="small">启动</text>

  <line x1="710" y1="357" x2="780" y2="357" class="line"/>
  <text x="724" y="338" class="small">完成</text>

  <path d="M855 404 L855 610 L375 610 L375 404" class="line"/>
  <text x="608" y="596" class="small">关闭</text>

  <path d="M855 310 L855 230 L1050 230" class="faultline"/>
  <text x="930" y="214" class="small">故障</text>

  <path d="M615 310 L615 168 L1050 168 L1050 210" class="faultline"/>
  <text x="754" y="154" class="small">启动异常</text>

  <line x1="1155" y1="280" x2="1155" y2="440" class="line"/>
  <text x="1172" y="370" class="small">清故障</text>

  <path d="M1050 490 L375 490 L375 404" class="line"/>
  <text x="650" y="476" class="small">恢复到 IDLE</text>

  <text x="80" y="518" class="note">故障采用锁存方式，是为了保留故障码和关键变量，方便后续定位问题。</text>
</svg>
